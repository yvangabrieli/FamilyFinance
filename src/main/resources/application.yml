spring:
  application:
    name: FamilyFinance

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:familyfinance}
    username: ${DB_USER:ffuser}
    password: ${DB_PASSWORD:ffpass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway manages the schema — never let Hibernate modify it
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1

# JWT configuration
jwt:
  secret: ${JWT_SECRET:change-this-secret-in-production-use-at-least-256-bits}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}         # 24 hours
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}  # 7 days

# Actuator (health checks for deployment)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.familyfinance: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
