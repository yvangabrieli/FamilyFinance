services:

  postgres:
    image: postgres:16-alpine
    container_name: familyfinance-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: familyfinance
      POSTGRES_USER: ffuser
      POSTGRES_PASSWORD: ffpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ffuser -d familyfinance"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: familyfinance-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: familyfinance-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/familyfinance
      SPRING_DATASOURCE_USERNAME: ffuser
      SPRING_DATASOURCE_PASSWORD: ffpass
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data: